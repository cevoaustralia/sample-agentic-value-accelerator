AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Agent Safety Dashboard — Main stack.
  Creates DynamoDB tables, IAM roles, stop-sessions Lambda, and ECS Express Mode service.
  Requires ECR image to exist (deploy ecr-stack.yaml and push image first).

Parameters:
  ImageUri:
    Type: String
    Description: ECR image URI (e.g. 123456789012.dkr.ecr.us-east-1.amazonaws.com/safety-dashboard:latest)

  AdminEmail:
    Type: String
    Description: Email for the default admin user
    Default: 'admin@agent-safety.local'
    AllowedPattern: '.+@.+'
    ConstraintDescription: Must be a valid email address

  RegistryTableName:
    Type: String
    Default: safety-dashboard-registry

  SessionTableName:
    Type: String
    Default: safety-dashboard-sessions

  InterventionTableName:
    Type: String
    Default: safety-dashboard-interventions

  CostSignalsTableName:
    Type: String
    Default: safety-dashboard-cost-signals

  ObsSignalsTableName:
    Type: String
    Default: safety-dashboard-obs-signals

  EvalSignalsTableName:
    Type: String
    Default: safety-dashboard-eval-signals

  StopSessionsLambdaName:
    Type: String
    Default: SafetyDashboard-StopSessions

  BudgetPrefix:
    Type: String
    Default: agent-

  ECSServiceName:
    Type: String
    Default: agent-safety-dashboard
    Description: Name for the ECS Express Mode service

  ECSCpu:
    Type: String
    Default: '256'
    Description: CPU units for ECS task (256 = 0.25 vCPU)
    AllowedValues: ['256', '512', '1024', '2048', '4096']

  ECSMemory:
    Type: String
    Default: '512'
    Description: Memory in MiB for ECS task
    AllowedValues: ['512', '1024', '2048', '3072', '4096', '8192']

  AllowedIngressCidr:
    Type: String
    Default: '10.0.0.0/8'
    Description: CIDR block allowed to access the dashboard (e.g. corporate VPN range). No 0.0.0.0/0.

  EnableCloudFront:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: Enable CloudFront distribution in front of the ALB

  DashboardVpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC ID for the dashboard (used for ALB security group)

  DashboardSubnets:
    Type: String
    Default: ''
    Description: Comma-separated subnet IDs for ECS (leave empty to use VPC defaults)

Conditions:
  HasCustomSubnets: !Not [!Equals [!Ref DashboardSubnets, '']]
  UseCloudFront: !Equals [!Ref EnableCloudFront, 'true']

Resources:
  # =========================================================================
  # DynamoDB Tables
  # =========================================================================
  AgentRegistryTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref RegistryTableName
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: agent_name
          AttributeType: S
      KeySchema:
        - AttributeName: agent_name
          KeyType: HASH
      Tags:
        - Key: component
          Value: agent-safety

  SessionTokenUsageTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref SessionTableName
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: session_id
          AttributeType: S
      KeySchema:
        - AttributeName: session_id
          KeyType: HASH
      Tags:
        - Key: component
          Value: agent-safety

  InterventionLogTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref InterventionTableName
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: intervention_id
          AttributeType: S
      KeySchema:
        - AttributeName: intervention_id
          KeyType: HASH
      Tags:
        - Key: component
          Value: agent-safety

  CostSignalsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref CostSignalsTableName
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: agent_name
          AttributeType: S
      KeySchema:
        - AttributeName: agent_name
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: expires_at
        Enabled: true
      Tags:
        - Key: component
          Value: agent-safety

  ObsSignalsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref ObsSignalsTableName
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: agent_name
          AttributeType: S
        - AttributeName: signal_key
          AttributeType: S
      KeySchema:
        - AttributeName: agent_name
          KeyType: HASH
        - AttributeName: signal_key
          KeyType: RANGE
      TimeToLiveSpecification:
        AttributeName: expires_at
        Enabled: true
      Tags:
        - Key: component
          Value: agent-safety

  EvalSignalsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref EvalSignalsTableName
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: agent_name
          AttributeType: S
        - AttributeName: signal_key
          AttributeType: S
      KeySchema:
        - AttributeName: agent_name
          KeyType: HASH
        - AttributeName: signal_key
          KeyType: RANGE
      TimeToLiveSpecification:
        AttributeName: expires_at
        Enabled: true
      Tags:
        - Key: component
          Value: agent-safety


  # =========================================================================
  # Cognito — User Pool, App Client, Domain, Default Admin User
  # =========================================================================
  CognitoUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub '${AWS::StackName}-users'
      AutoVerifiedAttributes:
        - email
      UsernameAttributes:
        - email
      MfaConfiguration: 'OFF'
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: true
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false
          TemporaryPasswordValidityDays: 7
      AccountRecoverySetting:
        RecoveryMechanisms:
          - Name: verified_email
            Priority: 1
      UserPoolTags:
        component: agent-safety

  CognitoUserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: !Sub '${AWS::StackName}-${AWS::AccountId}'
      UserPoolId: !Ref CognitoUserPool

  CognitoAppClient:
    Type: AWS::Cognito::UserPoolClient
    DependsOn: CognitoUserPoolDomain
    Properties:
      ClientName: dashboard-web
      UserPoolId: !Ref CognitoUserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_SRP_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
      SupportedIdentityProviders:
        - COGNITO
      AllowedOAuthFlows:
        - code
      AllowedOAuthScopes:
        - openid
        - email
        - profile
      AllowedOAuthFlowsUserPoolClient: true
      # Callback URLs — updated post-deploy with actual ECS/CloudFront URLs
      CallbackURLs:
        - https://placeholder.example.com
      LogoutURLs:
        - https://placeholder.example.com

  CognitoAdminUser:
    Type: AWS::Cognito::UserPoolUser
    DependsOn: CognitoUserPool
    Properties:
      UserPoolId: !Ref CognitoUserPool
      Username: !Ref AdminEmail
      UserAttributes:
        - Name: email
          Value: !Ref AdminEmail
        - Name: email_verified
          Value: 'true'
      MessageAction: SUPPRESS


  # =========================================================================
  # Lambda — Stop Sessions (IAM Role + Function)
  # =========================================================================
  StopSessionsLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${AWS::StackName}-StopSessionsLambdaRole'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: StopSessionsPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:Scan
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                Resource:
                  - !Sub 'arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${SessionTableName}'
                  - !Sub 'arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${InterventionTableName}'
              - Effect: Allow
                Action:
                  - bedrock-agentcore:ListAgentRuntimes
                  - bedrock-agentcore:StopRuntimeSession
                Resource: '*'

  StopSessionsLambda:
    Type: AWS::Lambda::Function
    # Wait for role to propagate — avoids "role cannot be assumed" race condition
    DependsOn: StopSessionsLambdaRole
    Properties:
      FunctionName: !Ref StopSessionsLambdaName
      Runtime: python3.13
      Handler: index.handler
      Timeout: 120
      MemorySize: 256
      Role: !GetAtt StopSessionsLambdaRole.Arn
      Environment:
        Variables:
          REGION: !Ref AWS::Region
          SESSION_TABLE: !Ref SessionTableName
          INTERVENTION_TABLE: !Ref InterventionTableName
      Code:
        ZipFile: |
          import json, logging, os, uuid
          from datetime import datetime, timezone
          import boto3
          from botocore.config import Config
          from botocore.exceptions import ClientError

          logger = logging.getLogger()
          logger.setLevel(logging.INFO)
          REGION = os.environ.get("REGION", "us-east-1")
          SESSION_TABLE = os.environ.get("SESSION_TABLE", "session-token-usage")
          INTERVENTION_TABLE = os.environ.get("INTERVENTION_TABLE", "intervention-log")
          ACTIVE_THRESHOLD_MIN = 6
          IDLE_THRESHOLD_MIN = 30
          retry_config = Config(retries={"max_attempts": 3, "mode": "adaptive"})
          agentcore_control = boto3.client("bedrock-agentcore-control", region_name=REGION, config=retry_config)
          agentcore_data = boto3.client("bedrock-agentcore", region_name=REGION, config=retry_config)
          dynamodb = boto3.resource("dynamodb", region_name=REGION)

          def _normalize(name):
              return name.lower().replace("-", "").replace("_", "")

          def _classify_status(last_hb_str, stored_status=""):
              if stored_status in ("terminated", "completed"): return "inactive"
              try:
                  mins = (datetime.now(timezone.utc) - datetime.fromisoformat(last_hb_str)).total_seconds() / 60
                  if mins <= ACTIVE_THRESHOLD_MIN: return "active"
                  elif mins <= IDLE_THRESHOLD_MIN: return "idle"
                  return "inactive"
              except (ValueError, TypeError): return "unknown"

          def _resolve_arn(agent_name):
              norm = _normalize(agent_name)
              for page in agentcore_control.get_paginator("list_agent_runtimes").paginate():
                  for rt in page.get("agentRuntimes", []):
                      if _normalize(rt["agentRuntimeName"]) == norm: return rt["agentRuntimeArn"]
              return None

          def handler(event, context):
              agent_name, reason, admin_user = event.get("agent_name",""), event.get("reason",""), event.get("admin_user","")
              target_session_id = event.get("session_id", "")
              if not all([agent_name, reason, admin_user]):
                  return {"statusCode": 400, "body": json.dumps({"error": "agent_name, reason, admin_user required"})}
              agent_arn = _resolve_arn(agent_name)
              if not agent_arn:
                  return {"statusCode": 404, "body": json.dumps({"error": f"Agent '{agent_name}' not found"})}
              sess_table = dynamodb.Table(SESSION_TABLE)
              norm = _normalize(agent_name)
              try: all_sess = sess_table.scan().get("Items", [])
              except ClientError as e: return {"statusCode": 500, "body": json.dumps({"error": str(e)})}
              active = [s for s in all_sess if _normalize(s.get("agent_name","")) == norm and _classify_status(s.get("last_heartbeat",""), s.get("status","")) in ("active","idle")]
              # If a specific session_id is provided, only stop that one
              if target_session_id:
                  active = [s for s in active if s.get("session_id") == target_session_id]
                  if not active:
                      # Session not in active list — try to stop it directly anyway
                      active = [{"session_id": target_session_id, "agent_name": agent_name}]
              if not active:
                  return {"statusCode": 200, "body": json.dumps({"agent_name": agent_name, "agent_runtime_arn": agent_arn, "total_sessions": 0, "stopped": 0, "failed": 0, "results": [], "intervention_ids": []})}
              results, iids, int_table = [], [], dynamodb.Table(INTERVENTION_TABLE)
              for s in active:
                  sid = s["session_id"]
                  sr, se = "stopped", ""
                  try: agentcore_data.stop_runtime_session(agentRuntimeArn=agent_arn, runtimeSessionId=sid, clientToken=f"stop-{sid}-{uuid.uuid5(uuid.NAMESPACE_DNS, sid)}")
                  except ClientError as e:
                      c = e.response["Error"]["Code"]
                      if c in ("ResourceNotFoundException","404"): sr = "not_found"
                      elif c == "ConflictException": sr = "already_stopping"
                      else: sr, se = "error", str(e)
                  results.append({"session_id": sid, "status": sr})
                  if sr in ("stopped","already_stopping","not_found"):
                      try: sess_table.update_item(Key={"session_id": sid}, UpdateExpression="SET #st = :s", ExpressionAttributeNames={"#st": "status"}, ExpressionAttributeValues={":s": "terminated"})
                      except ClientError: pass
                  iid = str(uuid.uuid4())
                  try:
                      item = {"intervention_id": iid, "timestamp": datetime.now(timezone.utc).isoformat(), "agent_runtime_arn": agent_arn, "agent_name": agent_name, "session_id": sid, "action": "stop_session", "triggered_by": "human", "reason": reason, "admin_user": admin_user, "stop_result": sr, "rollback_status": "none"}
                      if se: item["error_detail"] = se
                      int_table.put_item(Item=item); iids.append(iid)
                  except ClientError as e: logger.warning(f"Log failed: {e}")
              stopped = sum(1 for r in results if r["status"] in ("stopped","not_found","already_stopping"))
              return {"statusCode": 200, "body": json.dumps({"agent_name": agent_name, "agent_runtime_arn": agent_arn, "total_sessions": len(active), "stopped": stopped, "failed": len(active)-stopped, "results": results, "intervention_ids": iids})}
      Tags:
        - Key: component
          Value: agent-safety


  # =========================================================================
  # ECS Express Mode — IAM Roles
  # =========================================================================
  # IMPORTANT: ECS Express Mode requires three service-linked roles to exist
  # in the account before deployment:
  #   - AWSServiceRoleForECS (ecs.amazonaws.com)
  #   - AWSServiceRoleForElasticLoadBalancing (elasticloadbalancing.amazonaws.com)
  #   - AWSServiceRoleForApplicationAutoScaling_ECSService
  # These are created by deploy.sh Phase 0 pre-flight (idempotent via || true).
  # They CANNOT be in this CF template because AWS::IAM::ServiceLinkedRole
  # fails with AlreadyExists if the role was previously created in the account.

  # Task Execution Role — allows ECS to pull images from ECR and write logs
  # Trust: only ecs-tasks.amazonaws.com can assume this role
  ECSTaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${AWS::StackName}-ECSTaskExecutionRole'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Sub 'arn:${AWS::Partition}:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy'

  # Infrastructure Role — allows ECS to manage ALB, SGs, auto-scaling on your behalf
  # Trust: only ecs.amazonaws.com can assume this role
  ECSInfrastructureRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${AWS::StackName}-ECSInfraRole'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowAccessInfrastructureForECSExpressServices
            Effect: Allow
            Principal:
              Service: ecs.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Sub 'arn:${AWS::Partition}:iam::aws:policy/service-role/AmazonECSInfrastructureRoleforExpressGatewayServices'

  # Task Role — the role your container code assumes to call AWS APIs
  # Trust: only ecs-tasks.amazonaws.com can assume this role
  # Permissions: identical to the old AppRunnerInstanceRole DashboardPolicy
  ECSTaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${AWS::StackName}-ECSTaskRole'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: DashboardPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:Scan
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:DescribeTable
                Resource:
                  - !Sub 'arn:${AWS::Partition}:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${RegistryTableName}'
                  - !Sub 'arn:${AWS::Partition}:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${SessionTableName}'
                  - !Sub 'arn:${AWS::Partition}:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${InterventionTableName}'
                  - !Sub 'arn:${AWS::Partition}:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${CostSignalsTableName}'
                  - !Sub 'arn:${AWS::Partition}:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${ObsSignalsTableName}'
                  - !Sub 'arn:${AWS::Partition}:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${EvalSignalsTableName}'
              - Effect: Allow
                Action:
                  - bedrock-agentcore:ListAgentRuntimes
                  - bedrock-agentcore:GetAgentRuntime
                  - bedrock-agentcore:ListAgentRuntimeEndpoints
                  - bedrock-agentcore:ListTagsForResource
                  - bedrock-agentcore:StopRuntimeSession
                  - bedrock-agentcore:ListSessions
                  - bedrock-agentcore:ListOnlineEvaluationConfigs
                  - bedrock-agentcore:GetOnlineEvaluationConfig
                  - bedrock-agentcore:ListRegistries
                  - bedrock-agentcore:ListRegistryRecords
                  - bedrock-agentcore:GetRegistryRecord
                Resource: '*'
              - Effect: Allow
                Action:
                  - cloudwatch:GetMetricStatistics
                  - cloudwatch:DescribeAlarms
                  - cloudwatch:PutMetricAlarm
                  - cloudwatch:PutAnomalyDetector
                Resource: '*'
              # budgets:* — DescribeBudgets requires ViewBudget which is separate
              - Effect: Allow
                Action:
                  - budgets:*
                Resource: '*'
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource: !GetAtt StopSessionsLambda.Arn
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource: !Sub 'arn:${AWS::Partition}:lambda:${AWS::Region}:${AWS::AccountId}:function:agent-safety-kill-switch-KillSwitch'
              - Effect: Allow
                Action:
                  - sts:GetCallerIdentity
                Resource: '*'
              - Effect: Allow
                Action:
                  - sns:CreateTopic
                  - sns:Publish
                  - sns:ListSubscriptionsByTopic
                Resource: !Sub 'arn:${AWS::Partition}:sns:${AWS::Region}:${AWS::AccountId}:agent-stop-notify-*'


  # =========================================================================
  # ECS Express Mode — Custom ALB Security Group (restricted ingress)
  # =========================================================================
  # Express Mode's default ALB SG allows 0.0.0.0/0 on ports 80 and 443.
  # We override it with a custom SG that only allows HTTPS from the
  # specified corporate CIDR — no wide-open internet access.
  DashboardALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub 'ALB SG for ${ECSServiceName} - HTTPS from corporate CIDR only'
      VpcId: !Ref DashboardVpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: !Ref AllowedIngressCidr
          Description: HTTPS from corporate network only
      # Egress: allow only to the ECS tasks (Express Mode will add the rule
      # to reach tasks on container port automatically). We allow all outbound
      # here because the ALB needs to reach tasks on the container port and
      # perform health checks — Express Mode manages the specific rules.
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 8000
          ToPort: 8000
          CidrIp: 172.31.0.0/16
          Description: ALB to ECS tasks on container port within VPC only
      Tags:
        - Key: component
          Value: agent-safety
        - Key: Name
          Value: !Sub '${AWS::StackName}-alb-sg'

  # =========================================================================
  # ECS Express Mode Service
  # =========================================================================
  # Express Mode auto-provisions: Fargate tasks, ALB with HTTPS/TLS,
  # auto-scaling, ACM certificate, and a unique URL.
  # We pass a custom ALB SG via NetworkConfiguration to restrict ingress
  # to the corporate CIDR only — no 0.0.0.0/0 exposure.
  DashboardService:
    Type: AWS::ECS::ExpressGatewayService
    DependsOn:
      - ECSTaskExecutionRole
      - ECSInfrastructureRole
      - ECSTaskRole
      - StopSessionsLambda
      - DashboardALBSecurityGroup
    Properties:
      ServiceName: !Ref ECSServiceName
      ExecutionRoleArn: !GetAtt ECSTaskExecutionRole.Arn
      InfrastructureRoleArn: !GetAtt ECSInfrastructureRole.Arn
      TaskRoleArn: !GetAtt ECSTaskRole.Arn
      Cpu: !Ref ECSCpu
      Memory: !Ref ECSMemory
      HealthCheckPath: /api/health
      NetworkConfiguration:
        SecurityGroups:
          - !Ref DashboardALBSecurityGroup
        Subnets: !If
          - HasCustomSubnets
          - !Split [',', !Ref DashboardSubnets]
          - !Ref 'AWS::NoValue'
      PrimaryContainer:
        Image: !Ref ImageUri
        ContainerPort: 8000
        Environment:
          - Name: AWS_REGION
            Value: !Ref AWS::Region
          - Name: REGISTRY_TABLE
            Value: !Ref RegistryTableName
          - Name: SESSION_TABLE
            Value: !Ref SessionTableName
          - Name: INTERVENTION_TABLE
            Value: !Ref InterventionTableName
          - Name: COST_SIGNALS_TABLE
            Value: !Ref CostSignalsTableName
          - Name: OBS_SIGNALS_TABLE
            Value: !Ref ObsSignalsTableName
          - Name: EVAL_SIGNALS_TABLE
            Value: !Ref EvalSignalsTableName
          - Name: STOP_SESSIONS_LAMBDA
            Value: !Ref StopSessionsLambdaName
          - Name: KILL_SWITCH_LAMBDA
            Value: agent-safety-kill-switch-KillSwitch
          - Name: BUDGET_PREFIX
            Value: !Ref BudgetPrefix
          - Name: ALLOWED_ORIGINS
            Value: '*'
          - Name: COGNITO_USER_POOL_ID
            Value: !Ref CognitoUserPool
          - Name: COGNITO_APP_CLIENT_ID
            Value: !Ref CognitoAppClient
          - Name: COGNITO_DOMAIN
            Value: !Sub '${AWS::StackName}-${AWS::AccountId}.auth.${AWS::Region}.amazoncognito.com'
          - Name: COGNITO_REGION
            Value: !Ref AWS::Region
          - Name: ORIGIN_VERIFY_HEADER
            Value: !If
              - UseCloudFront
              - !Sub '${AWS::StackName}-${AWS::AccountId}-origin-secret'
              - ''
          # COGNITO_REDIRECT_URI is set post-deploy by deploy.sh Phase 4b
          # because the ECS endpoint URL is not known until after creation.
          # The api.py code auto-detects from the request Host header when
          # this env var is empty, so the dashboard works immediately.
      ScalingTarget:
        MinTaskCount: 1
        MaxTaskCount: 20
        AutoScalingMetric: AVERAGE_CPU
        AutoScalingTargetValue: 60
      Tags:
        - Key: component
          Value: agent-safety

  # =========================================================================
  # CloudFront Distribution — Restricts ALB access to CloudFront only
  # =========================================================================
  # When enabled, CloudFront sits in front of the ALB and sends a secret
  # header (X-Origin-Verify) that the FastAPI app validates. The ALB SG
  # is updated post-deploy to only allow traffic from CloudFront IPs.
  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Condition: UseCloudFront
    DependsOn: DashboardService
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub 'Agent Safety Dashboard - ${AWS::StackName}'
        DefaultCacheBehavior:
          TargetOriginId: dashboard-alb
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD, OPTIONS, PUT, POST, PATCH, DELETE]
          CachedMethods: [GET, HEAD]
          CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad  # CachingDisabled
          OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac  # AllViewerExceptHostHeader
          Compress: true
        Origins:
          - Id: dashboard-alb
            DomainName: !GetAtt DashboardService.Endpoint
            CustomOriginConfig:
              OriginProtocolPolicy: https-only
              HTTPSPort: 443
              OriginSSLProtocols: [TLSv1.2]
            OriginCustomHeaders:
              - HeaderName: X-Origin-Verify
                HeaderValue: !Sub '${AWS::StackName}-${AWS::AccountId}-origin-secret'
        HttpVersion: http2and3
        PriceClass: PriceClass_100
      Tags:
        - Key: component
          Value: agent-safety

Outputs:
  DashboardUrl:
    Description: Dashboard URL
    Value: !If
      - UseCloudFront
      - !Sub 'https://${CloudFrontDistribution.DomainName}'
      - !Sub 'https://${DashboardService.Endpoint}'
  DashboardDirectUrl:
    Description: Direct ALB URL (bypasses CloudFront)
    Value: !Sub 'https://${DashboardService.Endpoint}'
  CloudFrontDistributionId:
    Condition: UseCloudFront
    Description: CloudFront distribution ID
    Value: !Ref CloudFrontDistribution
  CloudFrontDomainName:
    Condition: UseCloudFront
    Description: CloudFront domain name
    Value: !GetAtt CloudFrontDistribution.DomainName
  DashboardServiceArn:
    Description: ECS Express Mode service ARN
    Value: !GetAtt DashboardService.ServiceArn
  CognitoUserPoolId:
    Description: Cognito User Pool ID
    Value: !Ref CognitoUserPool
  CognitoAppClientId:
    Description: Cognito App Client ID
    Value: !Ref CognitoAppClient
  CognitoDomain:
    Description: Cognito Hosted UI domain
    Value: !Sub '${AWS::StackName}-${AWS::AccountId}.auth.${AWS::Region}.amazoncognito.com'
  CognitoLoginUrl:
    Description: Cognito login URL (update callback URL after first deploy)
    Value: !Sub 'https://${AWS::StackName}-${AWS::AccountId}.auth.${AWS::Region}.amazoncognito.com/login?client_id=${CognitoAppClient}&response_type=code&scope=openid+email+profile&redirect_uri=https://${DashboardService.Endpoint}'
  DefaultAdminEmail:
    Description: Admin login email
    Value: !Ref AdminEmail
  DefaultAdminPassword:
    Description: Admin login password (set by deploy.sh)
    Value: 'AgentSafety123!'
  LoginInstructions:
    Description: How to log in
    Value: !Sub 'Open the DashboardUrl, sign in with ${AdminEmail} / AgentSafety123!'
  StopSessionsLambdaArn:
    Value: !GetAtt StopSessionsLambda.Arn
  TaskRoleArn:
    Description: ECS Task Role ARN (replaces old AppRunner InstanceRoleArn)
    Value: !GetAtt ECSTaskRole.Arn
  HealthCheckUrl:
    Value: !Sub 'https://${DashboardService.Endpoint}/api/health'
