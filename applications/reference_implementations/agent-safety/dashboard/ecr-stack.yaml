AWSTemplateFormatVersion: '2010-09-09'
Description: Agent Safety Dashboard — ECR Repository (deploy first)

Parameters:
  ECRRepoName:
    Type: String
    Default: safety-dashboard
    Description: ECR repository name for the dashboard container image

Resources:
  ECRRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Ref ECRRepoName
      ImageScanningConfiguration:
        ScanOnPush: true
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [
              {
                "rulePriority": 1,
                "description": "Keep only last 5 images",
                "selection": {
                  "tagStatus": "any",
                  "countType": "imageCountMoreThan",
                  "countNumber": 5
                },
                "action": { "type": "expire" }
              }
            ]
          }
      Tags:
        - Key: component
          Value: agent-safety

Outputs:
  ECRRepositoryUri:
    Description: ECR repository URI
    Value: !GetAtt ECRRepository.RepositoryUri
  ECRRepositoryArn:
    Description: ECR repository ARN
    Value: !GetAtt ECRRepository.Arn
