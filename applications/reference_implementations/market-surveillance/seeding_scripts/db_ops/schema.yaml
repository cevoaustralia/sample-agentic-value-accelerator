  - name: ref_dealer_name
    type: Reference
    purpose: Database
    description: Dealer Name
    schema:
      - column: ref_dealer_name
        data_type: Alphanumeric
        primary_key: true
        description: Dealer Name

  - name: ref_ecomm_app
    type: Reference
    purpose: Database
    description: eComm Apps
    schema:
      - column: ref_ecomm_app_code
        data_type: Alphanumeric
        primary_key: true
        description: Ecomm App Code
      - column: ref_ecomm_app_type
        data_type: Alphanumeric
        description: Ecomm App Type

  - name: ref_event_type
    type: Reference
    purpose: Database
    description: Event Type
    schema:
      - column: ref_event_type
        data_type: Alphanumeric
        primary_key: true
        description: Event Type

  - name: ref_reg_code
    type: Reference
    purpose: Database
    description: Reg Code
    schema:
      - column: ref_reg_code
        data_type: Alphanumeric
        primary_key: true
        description: Reg Code

  - name: ref_government_bond_liquidity_threshold
    type: Reference
    purpose: Database
    description: Government Bond Liquidity Threshold
    schema:
      - column: govt_liq_currency
        data_type: Alphanumeric
        primary_key: true
        description: Currency Code
      - column: "0 - 3 Years"
        data_type: Integer
        description: Liquidity threshold amount for the corresponding bucket (column name)
      - column: "4 - 7 Years"
        data_type: Integer
        description: Liquidity threshold amount for the corresponding bucket (column name)
      - column: "8 - 15 Years"
        data_type: Integer
        description: Liquidity threshold amount for the corresponding bucket (column name)
      - column: "16 - 25 Years"
        data_type: Integer
        description: Liquidity threshold amount for the corresponding bucket (column name)
      - column: "26 - 30 Years"
        data_type: Integer
        description: Liquidity threshold amount for the corresponding bucket (column name)

