        description: Venue Name

  # ==================== CONFIGURATION TABLES ====================

  - name: report_list
    type: Dictionary
    purpose: Output_config
    description: List of output tables to be generated
    schema:
      - column: report_name
        data_type: Alphanumeric
        description: Name of the output report/table
      - column: report_description
        data_type: Alphanumeric
        description: Description of the report purpose

  - name: output_schema
    type: Schema
    purpose: Output_config
    description: Break down of output tables and relevant columns
    schema:
      - column: output_table
        data_type: Alphanumeric
        description: Name of the output table
      - column: column_name
        data_type: Alphanumeric
        description: Column name in output
      - column: source_table
        data_type: Alphanumeric
        description: Source table for the column
      - column: required
        data_type: Alphanumeric
        description: Whether the field is required (Yes/No)
