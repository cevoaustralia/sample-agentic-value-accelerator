  - name: ref_capacity_type
    type: Reference
    purpose: Database
    description: Capacity Type
    schema:
      - column: ref_capacity_type
        data_type: Alphanumeric
        primary_key: true
        description: Capacity Type

  - name: ref_country_name
    type: Reference
    purpose: Database
    description: Country Name
    schema:
      - column: ref_country_name
