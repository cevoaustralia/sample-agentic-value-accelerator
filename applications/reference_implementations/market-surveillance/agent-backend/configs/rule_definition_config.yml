# Market Surveillance - US Rates Surveillance Decision Tree
name: "Market Surveillance - US Rates - Decision Tree"
description: >
  Decision-tree for disposition of institutional surveillance detection alerts (US Rates).
business_domain: "Risk Management"
business_sub-domain: "Market Surveillance"
surveillance: "Market Surveillance"
asset_class: "Fixed Income"
asset_type: "Rates"
region: "US"
version: "1.0"
metadata:
  author: Surveillance Team
  created: "2025-01-15"
  last_updated: "2025-06-01"
  domain: "market_conduct_market_surveillance"
  notes: >
    Sample reference implementation rules for demonstration purposes.

rule_sequence: "Rules with rule_type = 'Individual' should be tested first, followed by Rules with rule_type = 'Aggregate'"

hierarchy:
  level_1: relevant_product_types
  level_2: rule_name


data_validation:
  alert_details:
    description: "Alert information that triggered the investigation"
    source_table: "fact_alert"
    required_fields:
      - alert_id
      - alert_date
      - alert_time
      - alert_summary
      - alert_isin
      - alert_account_name
      - alert_account_number
      - trade_side
      - trade_price
      - trade_qty
  pivot_trade:
    description: "The customer trade that triggered the alert"
    source_table: "fact_trade"
    required_fields:
      - trade_id
      - trade_date
      - trade_time
      - trade_price
      - trade_qty
      - trade_side_code
      - trade_notional
      - trade_type
      - trade_source
      - book_code
      - standard_id
      - trader_id
      - trader_name
      - account_name
      - account_number
  flagged_trades:
    description: "Suspected flagged trades to evaluate against decision tree"
    source_table: "fact_trade"
    required_fields:
      - trade_id
      - trade_date
      - trade_time
      - trade_price
      - trade_qty
      - trade_side_code
      - trade_notional
      - trade_type
      - trade_source
      - book_code
      - standard_id
      - trader_id
      - trader_name
      - account_name
      - account_number
  product_details:
    description: "Security characteristics and classifications"
    source_table: "dim_product"
    required_fields:
      - product_isin
      - product_type
      - product_sub_type
      - product_category
      - product_maturity_date
      - product_issue_date
      - product_currency_of_issue
      - product_country_of_issue
      - product_description
  account_details:
    description: "Account structure and ownership"
    source_table: "dim_account"
    required_fields:
      - account_id
      - account_name
      - account_number
      - account_type
      - account_sub_type
      - account_country
  actor_details:
    description: "Trader and counterparty information"
    source_table: "dim_actor"
    required_fields:
      - actor_trader_id
      - actor_trader_name
      - actor_position
      - actor_trading_desk
      - actor_risk_area
      - actor_account_name
  ecomm_evidence:
    description: "Electronic communications evidence from eComm analysis (may be absent if no conversations found)"
    source_table: "fact_ecomm"
    required_fields: []
    optional_fields:
      - conversation_id
      - conversation_start_timestamp
      - conversation_end_timestamp
      - intent_type
      - intent_message
      - intent_timestamp
      - classification_tier
      - participants
    note: "If no eComm data was found, the Coordinator should pass an explicit statement: 'No eComm evidence found within the time window.' The Trade Analyst agent should proceed with evaluation but note that rules requiring eComm cannot be confirmed via eComm Agent"

decision_tree:

  - relevant_product_types: "All"

    rules:

      - rule_name: "Concentration Threshold"
        rule_type: Aggregate
        rule_id: "R1"
        pass_criteria: |
          The Market Value of the potential Flagged Trade is less than 60 percent of the Market Value of the Pivot Trade.
          If there are multiple potential Flagged Trades, the total Market Value of all potential Flagged Trades must be less than 60 percent of the Market Value of the Pivot Trade.
        pass_criteria_trade_type: "Flagged Trade"

      - rule_name: "Separate Desk Assignment"
        rule_type: Individual
        rule_id: "R2"
        pass_criteria: |
          The Trader who executed the potential Flagged Trade is assigned to a different Trading Desk than the Trader who executed the customer Pivot Trade.
        pass_criteria_trade_type: "Flagged Trade"

      - rule_name: "Client-Initiated Trade"
        rule_type: Individual
        rule_id: "R3"
        pass_criteria: |
          The potential Flagged Trade is initiated by a Client Request, such as a Request for Quote.
          This condition is confirmed by reviewing Order information in the Electronic Communications System.
        pass_criteria_trade_type: "Flagged Trade"

      - rule_name: "Trade Cancellation"
        rule_type: Individual
        rule_id: "R4"
        pass_criteria: |
          The Trade Type of the transaction indicates that the Trade has been Cancelled or Voided.
        pass_criteria_trade_type: "Flagged Trade and Pivot"

      - rule_name: "Same Account"
        rule_type: Individual
        rule_id: "R5"
        pass_criteria: |
          The Account for the Pivot Trade and the potential Flagged Trade is the same.
        pass_criteria_trade_type: "Flagged Trade"

      - rule_name: "Trade Date Mismatch"
        rule_type: Individual
        rule_id: "R6"
        pass_criteria: |
          The Trade Date of the Flagged Trade is not equal to the Trade Date of the Pivot Trade.
        pass_criteria_trade_type: "Flagged Trade"

      - rule_name: "Pre-Arranged Terms"
        rule_type: Individual
        rule_id: "R7"
        pass_criteria: |
          The Pivot Trade Terms are agreed before the potential Flagged Trade is initiated.
          This condition is confirmed by reviewing Order information in the Electronic Communications System.
        pass_criteria_trade_type: "Flagged Trade"

  - relevant_product_types: "Agency Security"

    rules:
      - rule_name: "GSE Issuer Match"
        rule_type: Individual
        rule_id: "R8"
        pass_criteria: |
          The Issuer of the Security and the Counterparty to the Trade are the same government-sponsored enterprise.
        pass_criteria_trade_type: "Flagged Trade"

  - relevant_product_types: "Government Bond"

    rules:
      - rule_name: "Liquidity Threshold"
        rule_type: Individual
        rule_id: "R9"
        pass_criteria: |
          The Market Value of the Pivot Trade is less than the Liquidity Threshold corresponding to the Currency and the Remaining Tenor of the instrument.
        pass_criteria_trade_type: "Pivot"
