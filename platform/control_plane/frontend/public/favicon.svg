    <!-- Top pins -->
    <rect x="11" y="5" width="2" height="4" rx="0.5"/>
    <rect x="19" y="5" width="2" height="4" rx="0.5"/>
    <!-- Bottom pins -->
    <rect x="11" y="23" width="2" height="4" rx="0.5"/>
    <rect x="19" y="23" width="2" height="4" rx="0.5"/>
    <!-- Left pins -->
